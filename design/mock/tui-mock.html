<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>AWS Cost Builder — TUI Mock · 22 Screens</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0d0f13; font-family: 'JetBrains Mono','Cascadia Code','Fira Code','Menlo',monospace; color: #dcdfe4; height: 100vh; overflow: hidden; display: flex; }

/* sidebar */
#sidebar { width: 210px; min-width: 210px; background: #161a1f; border-right: 1px solid #3e4451; display: flex; flex-direction: column; overflow: hidden; }
.sb-hdr { padding: 10px 12px; border-bottom: 1px solid #3e4451; flex-shrink: 0; }
.sb-title { color: #56b6c2; font-weight: bold; font-size: 12px; letter-spacing: 1px; }
.sb-sub { color: #5c6370; font-size: 10px; margin-top: 1px; }
.sb-list { overflow-y: auto; flex: 1; }
.sb-grp { padding: 7px 12px 2px; color: #5c6370; font-size: 9px; letter-spacing: 2px; text-transform: uppercase; font-weight: bold; }
.sb-item { padding: 4px 12px 4px 16px; cursor: pointer; border-left: 2px solid transparent; color: #5c6370; font-size: 11px; line-height: 1.5; transition: all .1s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sb-item:hover { background: #1f2329; color: #abb2bf; }
.sb-item.active { background: #2c313c; border-left-color: #56b6c2; color: #dcdfe4; }

/* main */
#main { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: #1e2127; }
#topbar { height: 34px; min-height: 34px; background: #161a1f; border-bottom: 1px solid #3e4451; display: flex; align-items: center; padding: 0 12px; gap: 8px; flex-shrink: 0; }
.nbtn { background: transparent; border: 1px solid #3e4451; color: #abb2bf; border-radius: 3px; padding: 1px 10px; font-size: 11px; font-family: inherit; cursor: pointer; transition: all .1s; }
.nbtn:hover { background: #2c313c; color: #dcdfe4; }
.nbtn:disabled { border-color: transparent; color: #5c6370; cursor: default; }
#topbar-lbl { flex: 1; text-align: center; color: #5c6370; font-size: 11px; }
#topbar-lbl .hl { color: #e5c07b; }
#topbar-lbl .ct { color: #5c6370; font-size: 10px; margin-left: 8px; }
#canvas { flex: 1; overflow: hidden; }

/* animations */
@keyframes fadeIn { from{opacity:0;transform:translateY(3px)} to{opacity:1;transform:translateY(0)} }
@keyframes blink  { 0%,100%{opacity:1} 50%{opacity:0} }
@keyframes pulse  { 0%,100%{opacity:1} 50%{opacity:.3} }
.screen { display: none; height: 100%; width: 100%; }
.screen.on { display: flex; animation: fadeIn .15s ease; }

/* layout */
.split { display: flex; height: 100%; width: 100%; }
.yaml-p { width: 290px; min-width: 290px; border: 1px solid #56b6c2; border-radius: 4px; margin: 6px; display: flex; flex-direction: column; overflow: hidden; background: #21252b; }
.prompt-p { flex: 1; border: 1px solid #c678dd; border-radius: 4px; margin: 6px 6px 6px 0; display: flex; flex-direction: column; overflow: hidden; background: #21252b; }
.single-p { flex: 1; border: 1px solid #3e4451; border-radius: 4px; margin: 8px; display: flex; flex-direction: column; overflow: hidden; background: #21252b; }
.ptitle { padding: 4px 10px; border-bottom: 1px solid #3e4451; font-size: 10px; font-weight: bold; letter-spacing: 1px; text-transform: uppercase; flex-shrink: 0; }
.ptitle.cy { color: #56b6c2; border-bottom-color: #56b6c2; }
.ptitle.mg { color: #c678dd; border-bottom-color: #c678dd; }
.ptitle.bl { color: #61afef; border-bottom-color: #61afef; }
.ptitle.gn { color: #98c379; border-bottom-color: #98c379; }
.ptitle.yw { color: #e5c07b; border-bottom-color: #e5c07b; }
.ptitle.or { color: #e06c75; border-bottom-color: #e06c75; }
.pbody { flex: 1; padding: 8px 10px; overflow-y: auto; font-size: 12px; line-height: 1.55; }
.pfoot { padding: 3px 10px; border-top: 1px solid #3e4451; color: #5c6370; font-size: 10px; flex-shrink: 0; }

/* yaml */
.ylines { font-size: 11px; line-height: 1.7; }
.yl { display: flex; align-items: center; gap: 3px; padding: 0 2px; border-radius: 2px; }
.yl.act { background: #2c313c; }
.yn { color: #5c6370; width: 20px; text-align: right; flex-shrink: 0; font-size: 10px; }
.yg { width: 14px; flex-shrink: 0; }
.yl.act .yg { color: #56b6c2; }
.yk { color: #61afef; }
.yl.act .yk { color: #56b6c2; font-weight: bold; }
.yvs { color: #98c379; }
.yvn { color: #e5c07b; }
.yvb { color: #c678dd; }
.yvp { color: #5c6370; }
.yc { color: #5c6370; }

/* badge */
.bdg { display: inline-block; border-radius: 3px; font-size: 10px; padding: 1px 5px; font-weight: bold; border: 1px solid; }
.b-cy { background: #56b6c211; border-color: #56b6c255; color: #56b6c2; }
.b-yw { background: #e5c07b11; border-color: #e5c07b55; color: #e5c07b; }
.b-gn { background: #98c37911; border-color: #98c37955; color: #98c379; }
.b-or { background: #e06c7511; border-color: #e06c7555; color: #e06c75; }
.b-mg { background: #c678dd11; border-color: #c678dd55; color: #c678dd; }
.b-dm { background: #5c637011; border-color: #5c637055; color: #5c6370; }
.b-bl { background: #61afef11; border-color: #61afef55; color: #61afef; }

/* field */
.flabel { color: #e06c75; font-weight: bold; display: flex; align-items: center; flex-wrap: wrap; gap: 5px; margin-bottom: 4px; }
.fmeta { color: #5c6370; font-size: 11px; margin-bottom: 2px; }
.fmeta span { color: #e5c07b; }
.fmeta .dv { color: #abb2bf; }
.fnote { color: #5c6370; font-size: 11px; font-style: italic; margin-bottom: 4px; }
.ibox { border: 1px solid #56b6c2; border-radius: 3px; padding: 5px 10px; background: #2c313c; display: flex; align-items: center; gap: 6px; }
.ibox .pchar { color: #5c6370; }
.ibox .ival { color: #dcdfe4; }
.cursor { display: inline-block; width: 7px; height: 13px; background: #56b6c2; animation: blink 1s step-end infinite; vertical-align: middle; }
.ihint { color: #5c6370; font-size: 10px; margin-top: 3px; }

/* select list */
.slabel { color: #e06c75; font-weight: bold; margin-bottom: 6px; }
.slist { border: 1px solid #3e4451; border-radius: 4px; overflow: hidden; margin-bottom: 6px; }
.sitem { padding: 5px 10px; cursor: pointer; border-left: 3px solid #3e4451; }
.sitem.on { background: #2c313c; border-left-color: #98c379; }
.sitem .radio { margin-right: 6px; font-weight: bold; }
.sitem.on .radio { color: #98c379; }
.sitem.off .radio { color: #5c6370; }
.sitem.on .ot { color: #dcdfe4; }
.sitem.off .ot { color: #abb2bf; }
.sdesc { color: #5c6370; font-size: 11px; margin-left: 18px; margin-top: 1px; }
.shint { color: #5c6370; font-size: 10px; }

/* toggle */
.titem { padding: 6px 12px; cursor: pointer; border-left: 3px solid #3e4451; display: flex; align-items: flex-start; gap: 8px; }
.titem.on { background: #2c313c; border-left-color: #98c379; }
.titem .tg { font-weight: bold; margin-top: 1px; flex-shrink: 0; }
.titem.on .tg { color: #98c379; }
.titem.off .tg { color: #5c6370; }
.titem.on .tn { color: #dcdfe4; }
.titem.off .tn { color: #abb2bf; }
.tdesc { color: #5c6370; font-size: 11px; }

/* diamond hdr */
.dhdr { border: 1px solid #e5c07b; border-radius: 3px; padding: 5px 10px; margin-bottom: 8px; background: #252a33; flex-shrink: 0; }
.dhdr .d { color: #e5c07b; font-weight: bold; }
.dhdr .s { color: #5c6370; font-size: 11px; margin-left: 8px; }

/* breadcrumb */
.bc { color: #5c6370; font-size: 11px; margin-bottom: 6px; flex-shrink: 0; }
.bc .v { color: #abb2bf; }

/* progress */
.prog { margin-bottom: 8px; flex-shrink: 0; }
.prog-m { display: flex; justify-content: space-between; margin-bottom: 3px; }
.prog-m .ps { color: #5c6370; font-size: 11px; }
.prog-m .pc { color: #56b6c2; font-size: 11px; }
.prog-t { background: #3e4451; border-radius: 2px; height: 3px; }
.prog-f { background: #56b6c2; height: 100%; border-radius: 2px; }

/* event log */
.evlog { border-bottom: 1px solid #3e4451; margin-bottom: 8px; padding-bottom: 6px; flex-shrink: 0; }
.ev { font-size: 11px; line-height: 1.8; }

/* data table */
.dtbl { width: 100%; border-collapse: collapse; font-size: 12px; margin-bottom: 10px; }
.dtbl th { color: #5c6370; text-align: left; padding: 3px 8px; border-bottom: 1px solid #3e4451; font-weight: normal; font-size: 11px; }
.dtbl td { padding: 3px 8px; }
.dtbl tr:nth-child(even) td { background: #252a33; }

/* help panel */
.hpanel { border: 1px solid #e5c07b; border-radius: 3px; padding: 8px 12px; background: #252a33; margin-bottom: 10px; }
.hrow { color: #5c6370; font-size: 11px; line-height: 1.9; }
.hrow span { color: #abb2bf; }

/* stat pills */
.spills { display: flex; gap: 16px; padding: 8px 10px; background: #252a33; border-radius: 4px; margin-bottom: 12px; flex-shrink: 0; }
.spill .sl { color: #5c6370; font-size: 10px; text-align: center; margin-bottom: 2px; }
.spill .sv { font-weight: bold; font-size: 13px; text-align: center; }

/* full screen center */
.fs { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #1e2127; }
.sucircle { width: 60px; height: 60px; border-radius: 50%; border: 3px solid #98c379; display: flex; align-items: center; justify-content: center; margin: 0 auto 18px; font-size: 24px; color: #98c379; }
.irow { display: flex; align-items: center; padding: 5px 12px; border: 1px solid #3e4451; font-size: 12px; }
.irow .k { color: #5c6370; font-size: 11px; width: 130px; flex-shrink: 0; }

/* scrollback */
.scrollbk { border-bottom: 1px solid #5c6370; margin-bottom: 10px; padding-bottom: 8px; flex-shrink: 0; }
.sblbl { color: #5c6370; font-size: 10px; margin-bottom: 4px; font-style: italic; }

/* step log */
.step-r { display: flex; align-items: center; gap: 8px; padding: 2px 0; font-size: 12px; }
.step-r .si { width: 14px; flex-shrink: 0; }
.step-r.done .si { color: #5c6370; } .step-r.done .st { color: #5c6370; }
.step-r.act .si { color: #56b6c2; } .step-r.act .st { color: #56b6c2; font-weight: bold; }

/* svc bars */
.sbar { flex: 1; border: 1px solid #3e4451; border-radius: 3px; padding: 6px 10px; }
.sbar.act { border-color: #56b6c2; background: #2c313c; }
.sbar.done { border-color: #98c379; }
.sbar-t { background: #3e4451; border-radius: 2px; height: 3px; margin: 3px 0; }

/* scrollbars */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: #1a1d23; }
::-webkit-scrollbar-thumb { background: #3e4451; border-radius: 2px; }
</style>
</head>
<body>

<div id="sidebar">
  <div class="sb-hdr">
    <div class="sb-title">AWS Cost Builder</div>
    <div class="sb-sub">TUI Mock · 22 screens</div>
  </div>
  <div class="sb-list" id="sb-list"></div>
</div>

<div id="main">
  <div id="topbar">
    <button class="nbtn" id="btn-p">← prev</button>
    <div id="topbar-lbl"><span class="hl" id="t-label"></span><span class="ct" id="t-count"></span></div>
    <button class="nbtn" id="btn-n">next →</button>
  </div>
  <div id="canvas"></div>
</div>

<script>
const SCREENS = [
  {id:'splash',       label:'01 · Splash / Mode Select',       group:'Startup'},
  {id:'meta',         label:'02 · Project Metadata',           group:'Builder'},
  {id:'group_pick',   label:'03 · Group + Service Picker',     group:'Builder'},
  {id:'region',       label:'04 · Region Selection',           group:'Builder'},
  {id:'number_field', label:'05 · Number Field',               group:'Builder'},
  {id:'select_field', label:'06 · Select Field',               group:'Builder'},
  {id:'compound',     label:'07 · Compound VALUE+UNIT',        group:'Builder'},
  {id:'toggle_p1',    label:'08 · Toggle Phase 1 (S3)',        group:'Builder'},
  {id:'toggle_p2',    label:'09 · Toggle Phase 2 (S3)',        group:'Builder'},
  {id:'inline_help',  label:'10 · Inline Help (?)',            group:'Builder'},
  {id:'section_rev',  label:'11 · Post-Section Review',        group:'Builder'},
  {id:'service_rev',  label:'12 · Post-Service Review',        group:'Builder'},
  {id:'final_rev',    label:'13 · Final Profile Review',       group:'Builder'},
  {id:'saved',        label:'14 · Profile Saved',              group:'Builder'},
  {id:'preflight_ok', label:'15 · Preflight Pass',             group:'Runner'},
  {id:'preflight_fail',label:'16 · Preflight Failure',         group:'Runner'},
  {id:'running',      label:'17 · Browser Automation Live',    group:'Runner'},
  {id:'partial_fail', label:'18 · Partial Failure',            group:'Runner'},
  {id:'run_success',  label:'19 · Run Complete — Success',     group:'Runner'},
  {id:'artifact',     label:'20 · Artifact Viewer',            group:'Runner'},
  {id:'dryrun',       label:'21 · Dry-Run Output',             group:'Runner'},
  {id:'explore',      label:'22 · Explore Mode',               group:'Explorer'},
];

// helpers
const bdg = (t,c) => `<span class="bdg b-${c}">${t}</span>`;
function yl(i,k,v,t,act) {
  const ind='  '.repeat(i);
  const vcls = {s:'yvs',n:'yvn',b:'yvb',p:'yvp'}[t]||'';
  const g = act?'▶':' ';
  const vhtml = (v!==null&&v!==undefined)?`<span class="yc">: </span><span class="${vcls}">${v}</span>`:`<span class="yc">:</span>`;
  return `<div class="yl${act?' act':''}"><span class="yn"></span><span class="yg">${g}</span><span class="yc">${ind}</span><span class="yk">${k}</span>${vhtml}</div>`;
}
function yn(lines) {
  // add line numbers
  return lines.map((l,i) => l.replace('<span class="yn"></span>',`<span class="yn">${i+1}</span>`)).join('');
}
function yamlP(ls, foot) {
  return `<div class="yaml-p"><div class="ptitle cy">◀ YAML Preview</div><div class="pbody" style="padding:4px"><div class="ylines">${yn(ls)}</div></div><div class="pfoot">${foot}</div></div>`;
}
function prmP(c) { return `<div class="prompt-p"><div class="ptitle mg">Prompt</div><div class="pbody">${c}</div></div>`; }
function sngP(tcls, t, c) { return `<div style="display:flex;height:100%;width:100%"><div class="single-p"><div class="ptitle ${tcls}">${t}</div><div class="pbody">${c}</div></div></div>`; }
function dhdr(l,s) { return `<div class="dhdr"><span class="d">◆ ${l}</span>${s?`<span class="s">${s}</span>`:''}</div>`; }
function bc(g,sv) { return `<div class="bc"><b>Group:</b> <span class="v">${g}</span> › <b>Service:</b> <span class="v">${sv}</span></div>`; }
function prog(c,t,s,st) {
  const p=Math.round(c/t*100);
  return `<div class="prog"><div class="prog-m"><span class="ps">Section ${s} of ${st}</span><span class="pc">[${c}/${t}]</span></div><div class="prog-t"><div class="prog-f" style="width:${p}%"></div></div></div>`;
}
function ibox(v,act=true) { return `<div class="ibox"><span class="pchar">›</span><span class="ival">${v}</span>${act?'<span class="cursor"></span>':''}</div><div class="ihint">Enter to confirm · ? for help</div>`; }
function fblock({label,type='NUMBER',tc='cy',unit,def,note,req=true,val='',act=true}) {
  const rb = req?bdg('required','or'):bdg('optional','dm');
  const ul = unit?`<div class="fmeta">Unit: <span>${unit}</span></div>`:'';
  const dl = def!==undefined?`<div class="fmeta">Default: <span class="dv">${def}</span></div>`:'';
  const nl = note?`<div class="fnote">Note: ${note}</div>`:'';
  return `<div style="margin-bottom:12px"><div class="flabel">${label} ${bdg(type,tc)} ${rb}</div>${ul}${dl}${nl}${ibox(val,act)}</div>`;
}
function slist(label, opts, descs={}, sel=0) {
  const items = opts.map((o,i)=>{
    const on=i===sel; const d=descs[o]?`<div class="sdesc">${descs[o]}</div>`:'';
    return `<div class="sitem ${on?'on':'off'}"><span class="radio">${on?'●':'○'}</span><span class="ot">${o}</span>${d}</div>`;
  }).join('');
  return `<div>${label?`<div class="slabel">${label}</div>`:''}<div class="slist">${items}</div><div class="shint">↑↓ to move · Enter to select</div></div>`;
}

const R = {

splash: ()=>`<div class="fs" style="flex-direction:column;position:relative;overflow:hidden">
  <div style="position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 29px,rgba(86,182,194,0.018) 29px,rgba(86,182,194,0.018) 30px);pointer-events:none"></div>
  <div style="text-align:center;max-width:580px;z-index:1">
    <div style="color:#5c6370;font-size:10px;letter-spacing:6px;text-transform:uppercase;margin-bottom:6px">aws-cost-builder · v1.0 · local python cli</div>
    <div style="font-size:26px;font-weight:bold;letter-spacing:3px;margin-bottom:4px"><span style="color:#56b6c2">aws-cost</span><span style="color:#3e4451">-</span><span style="color:#c678dd">builder</span></div>
    <div style="color:#abb2bf;font-size:12px;margin-bottom:28px;letter-spacing:.5px">Automate AWS Pricing Calculator · Reusable JSON profiles · Git-friendly</div>
    <div style="border-top:1px solid #3e4451;border-bottom:1px solid #3e4451;padding:16px 0;margin-bottom:18px">
      <div style="color:#e5c07b;font-size:11px;font-weight:bold;margin-bottom:12px">◆ Select a command to begin:</div>
      ${[
        {cmd:'python main.py build',       desc:'Mode A — Interactive builder wizard',    c:'#56b6c2'},
        {cmd:'python main.py run --profile &lt;path&gt;', desc:'Mode B — Automate browser with profile', c:'#98c379'},
        {cmd:'python main.py explore',     desc:'Mode C — Scan service &amp; draft catalog', c:'#e5c07b'},
        {cmd:'python main.py run --dry-run',desc:'Mode D — Validate without launching browser',c:'#c678dd'},
      ].map(m=>`<div style="border:1px solid ${m.c}33;border-left:3px solid ${m.c};border-radius:4px;padding:7px 14px;margin-bottom:7px;text-align:left;display:flex;align-items:center;gap:14px;background:${m.c}08">
        <span style="color:${m.c};font-weight:bold;font-size:11px;width:260px;flex-shrink:0">${m.cmd}</span>
        <span style="color:#5c6370;font-size:11px">${m.desc}</span>
      </div>`).join('')}
    </div>
    <div style="color:#5c6370;font-size:11px;line-height:2">
      <span style="color:#56b6c2">python main.py</span> (no args) → interactive questionary mode picker
    </div>
  </div>
</div>`,

meta: ()=>{
  const ls=[yl(0,'schema_version','"2.0"','s'),yl(0,'project_name','"?"','p',true),yl(0,'description','"?"','p'),yl(0,'groups',null,'')];
  return `<div class="split">${yamlP(ls,'project root · step 1 of 3')}${prmP(`
    ${dhdr('Project Setup','Step 1 of 3')}
    <div style="color:#5c6370;font-size:11px;margin-bottom:12px">Give your estimate a name and optional description. These appear in the profile JSON and run artifacts.</div>
    ${fblock({label:'Project name',type:'TEXT',unit:undefined,def:'',note:"e.g. 'Web Tier — Production Estimate Q3'",req:true,val:'',act:true})}
    ${fblock({label:'Description',type:'TEXT',note:'Optional. Shown in run artifacts and YAML header.',req:false,act:false})}
  `)}</div>`;
},

group_pick: ()=>{
  const svcs=['Amazon EC2','Amazon S3','Amazon RDS for MySQL','Amazon CloudFront','AWS Lambda','Amazon ECS','Amazon ElastiCache','Amazon Route 53'];
  const chk=[0,2,4];
  const items=svcs.map((s,i)=>{const on=chk.includes(i);return `<div style="padding:5px 12px;border-left:3px solid ${on?'#98c379':'#3e4451'};background:${on?'#2c313c':'transparent'};display:flex;align-items:center;gap:8px"><span style="color:${on?'#98c379':'#5c6370'};font-weight:bold;width:14px;flex-shrink:0">${on?'◆':'◇'}</span><span style="color:${on?'#dcdfe4':'#abb2bf'};font-size:12px">${s}</span></div>`;}).join('');
  return sngP('yw','◆ Group &amp; Service Configuration — Step 2 of 3',`
    <div style="display:flex;gap:14px;height:100%">
      <div style="width:195px;flex-shrink:0">
        <div style="color:#e5c07b;font-weight:bold;font-size:11px;margin-bottom:8px">Group Details</div>
        <div style="color:#5c6370;font-size:11px;margin-bottom:3px">Group name</div>
        <div class="ibox" style="margin-bottom:8px"><span class="pchar">›</span><span class="ival">Production</span><span class="cursor"></span></div>
        <div style="color:#5c6370;font-size:11px;margin-bottom:3px">Parent group <span style="font-size:10px">(optional)</span></div>
        <div style="border:1px solid #3e4451;border-radius:3px;padding:4px 8px;background:#252a33;color:#5c6370;margin-bottom:16px;font-size:12px">— none —</div>
        <div style="color:#98c379;font-size:11px;margin-bottom:3px">✓ ${chk.length} services selected</div>
        <div style="color:#5c6370;font-size:10px">Space to toggle · Enter to confirm</div>
      </div>
      <div style="flex:1;min-width:0">
        <div style="color:#e5c07b;font-weight:bold;font-size:11px;margin-bottom:6px">Select Services</div>
        <div style="color:#5c6370;font-size:11px;margin-bottom:6px">Type to filter · Space to toggle · Enter to confirm</div>
        <div style="border:1px solid #3e4451;border-radius:4px;overflow:auto;max-height:360px">${items}</div>
      </div>
    </div>
  `);

/* ═══ APP LOGIC ═══ */
let idx = 0;

function renderSidebar() {
  const el = document.getElementById('sb-list');
  const grps = [...new Set(SCREENS.map(s=>s.group))];
  el.innerHTML = grps.map(g=>{
    const items = SCREENS.filter(s=>s.group===g).map(s=>{
      const i = SCREENS.indexOf(s);
      return `<div class="sb-item${i===idx?' active':''}" data-i="${i}">${s.label}</div>`;
    }).join('');
    return `<div class="sb-grp">${g}</div>${items}`;
  }).join('');
  el.querySelectorAll('.sb-item').forEach(el=>{
    el.addEventListener('click',()=>{idx=+el.dataset.i;render();});
  });
}

function render() {
  const s = SCREENS[idx];
  document.getElementById('t-label').textContent = s.label;
  document.getElementById('t-count').textContent = `${idx+1} / ${SCREENS.length}`;
  document.getElementById('btn-p').disabled = idx===0;
  document.getElementById('btn-n').disabled = idx===SCREENS.length-1;
  document.getElementById('canvas').innerHTML = `<div class="screen on">${(R[s.id]||R.splash)()}</div>`;
  renderSidebar();
}

document.getElementById('btn-p').addEventListener('click',()=>{if(idx>0){idx--;render();}});
document.getElementById('btn-n').addEventListener('click',()=>{if(idx<SCREENS.length-1){idx++;render();}});
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft'&&idx>0){idx--;render();}
  if(e.key==='ArrowRight'&&idx<SCREENS.length-1){idx++;render();}
});

render();
</script>
